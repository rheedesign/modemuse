<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Styliner">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2EFFE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#9B8FFF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)" stroke="#D8D1F7" stroke-width="12"/>
  <!-- Subtle circle accent -->
  <circle cx="256" cy="240" r="100" fill="url(#accent)" opacity="0.10"/>
  <!-- Scissors / edit icon -->
  <path d="M200 320l112-128" fill="none" stroke="#7C6FE0" stroke-width="16" stroke-linecap="round"/>
  <path d="M312 192l-20-8 8 20" fill="none" stroke="#7C6FE0" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- S monogram -->
  <text x="256" y="282" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-weight="800" font-size="160" fill="#5F52D3" letter-spacing="-4">S</text>
  <!-- Tagline underline -->
  <path d="M176 346h160" fill="none" stroke="#1A1A2E" stroke-opacity="0.12" stroke-width="12" stroke-linecap="round"/>
</svg>
